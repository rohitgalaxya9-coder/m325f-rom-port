name: Final LineageOS M325F Port

on:
  workflow_dispatch:

jobs:
  build_port:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y python3-pip lz4 android-sdk-libsparse-utils e2fsprogs 7zip p7zip-full unzip
        pip3 install gdown
        
        # Reliable lpunpack installation
        git clone https://github.com/whyshhnuv/lpunpack-lpmake-mirror.git lpbinary
        sudo cp lpbinary/binary/lpunpack /usr/local/bin/
        sudo chmod +x /usr/local/bin/lpunpack
        rm -rf lpbinary

    - name: Download and Prepare Files
      run: |
        gdown 1TxKbUfFXJvMQgmYt-6DZeHLua3KWE0WX -O lineage_gsi.7z
        gdown 10ctAw1Tgns0k8CsqL9c4zMbqgGUtSqDo -O AP.tar.md5
        
        # Extract GSI
        7z x lineage_gsi.7z -o./gsi_extracted/
        SYSTEM_IMG=$(find gsi_extracted/ -name "*.img" | head -1)
        simg2img "$SYSTEM_IMG" system_raw.img
        e2fsck -f system_raw.img || true
        resize2fs system_raw.img $(( $(du -m system_raw.img | cut -f1) + 400 ))M || true
        
        # Extract Samsung Super
        cp AP.tar.md5 AP.tar && tar -xf AP.tar super.img.lz4 || tar -xf AP.tar
        unlz4 super.img.lz4 super.img || true
        simg2img super.img super_raw.img
        mkdir -p super_extracted
        lpunpack super_raw.img super_extracted/

    - name: Mount and Inject
      run: |
        sudo mkdir -p /mnt/gsi_system /mnt/samsung_vendor
        sudo mount -o loop,rw system_raw.img /mnt/gsi_system
        sudo mount -o loop,ro super_extracted/vendor.img /mnt/samsung_vendor || true
        
        # 1. Inject Audio & Fingerprint Overlays
        sudo mkdir -p /mnt/gsi_system/system/product/overlay
        sudo cp /mnt/samsung_vendor/etc/audio_policy_configuration.xml /mnt/gsi_system/system/etc/ 2>/dev/null || true
        sudo cp /mnt/samsung_vendor/overlay/FrameworkResOverlay/*.apk /mnt/gsi_system/system/product/overlay/ 2>/dev/null || true
        
        # 2. Extract and Set Official Build Fingerprint
        BUILD_PROP=$(grep "ro.build.fingerprint" /mnt/samsung_system/system/build.prop | head -1 | cut -d'=' -f2)
        echo "Detected Fingerprint: $BUILD_PROP"
        
        # 3. Patch GSI build.prop
        GSI_PROP=$(find /mnt/gsi_system -name "build.prop" | head -1)
        sudo tee -a $GSI_PROP << EOF
        
        # Certified Samsung Build Fingerprint
        ro.build.fingerprint=$BUILD_PROP
        
        # Fingerprint Fixes
        persist.sys.phh.samsung_fingerprint=true
        ro.hardware.fp.vendor=samsung
        ro.hardware.fp.sideCap=true
        ro.vendor.fingerprint.sensor_location=side
        EOF

    - name: Repack and Finalize
      run: |
        sudo umount /mnt/gsi_system /mnt/samsung_vendor || true
        img2simg system_raw.img system_final.img
        dd if=/dev/zero bs=65536 count=1 of=vbmeta.img
        # Patch vbmeta (disable AVB)
        python3 -c "f=open('vbmeta.img','r+b'); d=bytearray(f.read()); d[123]=3; f.seek(0); f.write(d)"
        
        mkdir -p fastboot_package
        cp system_final.img fastboot_package/system.img
        cp vbmeta.img fastboot_package/vbmeta.img
        cd fastboot_package && zip -r9 ../M325F-Lineage-Fastboot.zip .
        
