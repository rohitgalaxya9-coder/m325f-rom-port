name: Final LineageOS M325F Port

on:
  workflow_dispatch:

jobs:
  build_port:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
    - name: Free up server disk space
      run: |
        echo "Nuking unnecessary GitHub bloatware to free up 30GB+ of space..."
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo rm -rf /usr/local/.ghcup
        sudo docker image prune --all --force
        echo "Available space now:"
        df -h

    - name: Install dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y python3-pip lz4 android-sdk-libsparse-utils e2fsprogs 7zip p7zip-full unzip
        pip3 install gdown
        
        # Reliable lpunpack installation
        git clone https://github.com/whyshhnuv/lpunpack-lpmake-mirror.git lpbinary
        sudo cp lpbinary/binary/lpunpack /usr/local/bin/
        sudo chmod +x /usr/local/bin/lpunpack
        rm -rf lpbinary

    - name: Download and Prepare Files
      run: |
        echo "Downloading LineageOS GSI..."
        gdown 1KJt0TVw-7V8HoktboqkRbVyrpVgb0v1f -O lineage_gsi.7z
        
        echo "Downloading Samsung AP..."
        gdown 1OI1yzrejBNETuWG9nrLP06r8l8aQVIA6 -O AP.tar.md5
        
        # Extract GSI
        7z x lineage_gsi.7z -o./gsi_extracted/
        SYSTEM_IMG=$(find gsi_extracted/ -name "*.img" | head -1)
        simg2img "$SYSTEM_IMG" system_raw.img
        e2fsck -f system_raw.img || true
        resize2fs system_raw.img $(( $(du -m system_raw.img | cut -f1) + 400 ))M || true
        
        # Extract Samsung Super
        cp AP.tar.md5 AP.tar && tar -xf AP.tar super.img.lz4 || tar -xf AP.tar
        unlz4 super.img.lz4 super.img || true
        simg2img super.img super_raw.img || cp super.img super_raw.img
        mkdir -p super_extracted
        lpunpack super_raw.img super_extracted/

    - name: Mount and Inject
      run: |
        sudo mkdir -p /mnt/gsi_system /mnt/samsung_vendor /mnt/samsung_system
        
        sudo mount -o loop,rw system_raw.img /mnt/gsi_system
        sudo mount -o loop,ro super_extracted/vendor.img /mnt/samsung_vendor || true
        sudo mount -o loop,ro super_extracted/system.img /mnt/samsung_system || true
        
        # 1. Inject Audio & Fingerprint Overlays
        sudo mkdir -p /mnt/gsi_system/system/product/overlay
        sudo cp /mnt/samsung_vendor/etc/audio_policy_configuration.xml /mnt/gsi_system/system/etc/ 2>/dev/null || true
        sudo cp -r /mnt/samsung_vendor/overlay/FrameworkResOverlay/*.apk /mnt/gsi_system/system/product/overlay/ 2>/dev/null || true
        sudo cp -r /mnt/samsung_vendor/overlay/SystemUIResOverlay/*.apk /mnt/gsi_system/system/product/overlay/ 2>/dev/null || true
        
        # 2. Dynamically locate Samsung build.prop and extract Fingerprint
        SAMSUNG_PROP=$(find /mnt/samsung_system -name "build.prop" | head -1)
        if [ -n "$SAMSUNG_PROP" ] && [ -f "$SAMSUNG_PROP" ]; then
          FINGERPRINT=$(grep -i "ro.build.fingerprint" "$SAMSUNG_PROP" | head -1 | cut -d'=' -f2)
          echo "Detected Fingerprint: $FINGERPRINT"
        else
          echo "WARNING: Samsung build.prop not found! Using certified fallback."
          FINGERPRINT="samsung/m325fxx/m325f:13/TP1A.220624.014/M325FXXS7DWD2:user/release-keys"
        fi
        
        # 3. Patch GSI build.prop securely
        GSI_PROP=$(find /mnt/gsi_system -name "build.prop" | head -1)
        if [ -n "$GSI_PROP" ] && [ -f "$GSI_PROP" ]; then
          cat << EOF > /tmp/extra_props.txt
        
        # Certified Samsung Build Fingerprint
        ro.build.fingerprint=$FINGERPRINT
        
        # Fingerprint Fixes
        persist.sys.phh.samsung_fingerprint=true
        ro.hardware.fp.vendor=samsung
        ro.hardware.fp.sideCap=true
        ro.vendor.fingerprint.sensor_location=side
        
        # Audio
        ro.multimedia.audio.supported=true
        ro.vendor.audio.sdk.fluencetype=none
        EOF
          
          sudo sh -c "cat /tmp/extra_props.txt >> $GSI_PROP"
          echo "Properties injected successfully."
        else
          echo "ERROR: GSI build.prop not found!"
        fi

    - name: Repack and Finalize
      run: |
        sudo umount /mnt/gsi_system /mnt/samsung_vendor /mnt/samsung_system || true
        img2simg system_raw.img system_final.img
        
        # Generate clean patched vbmeta
        dd if=/dev/zero bs=65536 count=1 of=vbmeta.img
        python3 -c "f=open('vbmeta.img','r+b'); d=bytearray(f.read()); d[123]=3; f.seek(0); f.write(d)"
        
        # Package for Fastboot
        mkdir -p fastboot_package
        cp system_final.img fastboot_package/system.img
        cp vbmeta.img fastboot_package/vbmeta.img
        cd fastboot_package && zip -r9 ../M325F-Lineage-Fastboot.zip .

    - name: Upload ROM
      uses: actions/upload-artifact@v4
      with:
        name: M325F-Lineage-Fastboot
        path: M325F-Lineage-Fastboot.zip
        retention-days: 7
        concurrency: 
