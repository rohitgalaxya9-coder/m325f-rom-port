name: Port LineageOS GSI for SM-M325F

on:
  workflow_dispatch:

jobs:
  port:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y \
          python3 python3-pip \
          7zip p7zip-full \
          android-sdk-libsparse-utils \
          e2fsprogs \
          cpio \
          tar \
          wget \
          curl
        pip3 install gdown

    - name: Download LineageOS GSI
      run: |
        echo "Downloading LineageOS GSI..."
        gdown 1TxKbUfFXJvMQgmYt-6DZeHLua3KWE0WX -O lineage_gsi.7z
        echo "GSI downloaded successfully"
        ls -lh lineage_gsi.7z

    - name: Download Samsung Stock ROM AP
      run: |
        echo "Downloading Samsung AP..."
        gdown 10ctAw1Tgns0k8CsqL9c4zMbqgGUtSqDo -O AP.tar.md5
        echo "AP downloaded successfully"
        ls -lh AP.tar.md5

    - name: Extract LineageOS GSI
      run: |
        echo "Extracting GSI..."
        7z x lineage_gsi.7z -o./gsi_extracted/
        ls -lh gsi_extracted/
        # Find the system.img
        SYSTEM_IMG=$(find gsi_extracted/ -name "*.img" | head -1)
        echo "Found image: $SYSTEM_IMG"
        cp "$SYSTEM_IMG" system_original.img

    - name: Extract Samsung AP
      run: |
        echo "Extracting Samsung AP tar..."
        # Remove md5 suffix and extract tar
        cp AP.tar.md5 AP.tar
        tar -xf AP.tar
        ls -lh
        # Find and extract any lz4 compressed images
        for f in *.lz4; do
          [ -f "$f" ] && unlz4 "$f" "${f%.lz4}" && echo "Extracted $f"
        done
        ls -lh *.img 2>/dev/null || echo "Listing all files:"
        ls -lh

    - name: Convert sparse images to raw
      run: |
        # Convert GSI system.img if sparse
        file system_original.img
        if file system_original.img | grep -q "sparse"; then
          echo "Converting sparse GSI to raw..."
          simg2img system_original.img system_raw.img
        else
          echo "GSI already raw format"
          cp system_original.img system_raw.img
        fi
        # Convert vendor.img if sparse
        if [ -f vendor.img ]; then
          file vendor.img
          if file vendor.img | grep -q "sparse"; then
            echo "Converting sparse vendor to raw..."
            simg2img vendor.img vendor_raw.img
          else
            cp vendor.img vendor_raw.img
          fi
        fi
        ls -lh *_raw.img 2>/dev/null

    - name: Mount images and extract blobs
      run: |
        # Create mount points
        sudo mkdir -p /mnt/gsi_system
        sudo mkdir -p /mnt/samsung_vendor

        # Resize GSI to add space for blobs (add 500MB)
        echo "Resizing GSI for blob injection..."
        e2fsck -f system_raw.img || true
        resize2fs system_raw.img $(( $(du -m system_raw.img | cut -f1) + 500 ))M || true

        # Mount GSI system
        sudo mount -o loop,rw system_raw.img /mnt/gsi_system
        echo "GSI mounted successfully"
        ls /mnt/gsi_system/

        # Mount Samsung vendor
        if [ -f vendor_raw.img ]; then
          sudo mount -o loop,ro vendor_raw.img /mnt/samsung_vendor
          echo "Samsung vendor mounted successfully"
          ls /mnt/samsung_vendor/
        else
          echo "WARNING: vendor.img not found!"
        fi

    - name: Inject Samsung blobs into GSI
      run: |
        VENDOR=/mnt/samsung_vendor
        SYSTEM=/mnt/gsi_system

        # Create target directories
        sudo mkdir -p $SYSTEM/vendor/firmware
        sudo mkdir -p $SYSTEM/vendor/lib
        sudo mkdir -p $SYSTEM/vendor/lib64
        sudo mkdir -p $SYSTEM/vendor/etc/wifi
        sudo mkdir -p $SYSTEM/vendor/etc/audio
        sudo mkdir -p $SYSTEM/vendor/lib/hw
        sudo mkdir -p $SYSTEM/vendor/lib64/hw

        echo "=== Injecting Wi-Fi firmware ==="
        if [ -d "$VENDOR/firmware" ]; then
          sudo cp -rf $VENDOR/firmware/* $SYSTEM/vendor/firmware/ 2>/dev/null && echo "Wi-Fi firmware injected" || echo "No firmware files"
        fi
        if [ -d "$VENDOR/etc/wifi" ]; then
          sudo cp -rf $VENDOR/etc/wifi/* $SYSTEM/vendor/etc/wifi/ 2>/dev/null && echo "Wi-Fi configs injected" || echo "No wifi configs"
        fi

        echo "=== Injecting RIL blobs ==="
        sudo find $VENDOR/lib -name "libsec-ril*" -exec sudo cp {} $SYSTEM/vendor/lib/ \; 2>/dev/null && echo "RIL lib injected" || echo "No RIL libs"
        sudo find $VENDOR/lib64 -name "libsec-ril*" -exec sudo cp {} $SYSTEM/vendor/lib64/ \; 2>/dev/null && echo "RIL lib64 injected" || echo "No RIL lib64"

        echo "=== Injecting Audio HAL ==="
        sudo find $VENDOR/lib/hw -name "audio.*" -exec sudo cp {} $SYSTEM/vendor/lib/hw/ \; 2>/dev/null && echo "Audio HAL injected" || echo "No audio HAL"
        sudo find $VENDOR/lib64/hw -name "audio.*" -exec sudo cp {} $SYSTEM/vendor/lib64/hw/ \; 2>/dev/null && echo "Audio HAL64 injected" || echo "No audio HAL64"
        if [ -d "$VENDOR/etc/audio" ]; then
          sudo cp -rf $VENDOR/etc/audio/* $SYSTEM/vendor/etc/audio/ 2>/dev/null && echo "Audio configs injected" || echo "No audio configs"
        fi
        # Audio policy config
        sudo find $VENDOR/etc -name "audio_policy*" -exec sudo cp {} $SYSTEM/vendor/etc/ \; 2>/dev/null || true
        sudo find $VENDOR/etc -name "mixer_paths*" -exec sudo cp {} $SYSTEM/vendor/etc/ \; 2>/dev/null || true

        echo "=== Injecting Bluetooth firmware ==="
        sudo find $VENDOR/firmware -name "*bt*" -exec sudo cp {} $SYSTEM/vendor/firmware/ \; 2>/dev/null || true
        sudo find $VENDOR/lib/hw -name "bluetooth*" -exec sudo cp {} $SYSTEM/vendor/lib/hw/ \; 2>/dev/null || true

        echo "=== Injecting GPU blobs (Mali-G52) ==="
        sudo mkdir -p $SYSTEM/vendor/lib/egl
        sudo mkdir -p $SYSTEM/vendor/lib64/egl
        sudo find $VENDOR/lib/egl -type f -exec sudo cp {} $SYSTEM/vendor/lib/egl/ \; 2>/dev/null && echo "GPU lib injected" || echo "No GPU libs"
        sudo find $VENDOR/lib64/egl -type f -exec sudo cp {} $SYSTEM/vendor/lib64/egl/ \; 2>/dev/null && echo "GPU lib64 injected" || echo "No GPU lib64"

        echo "=== Injecting Sensors HAL ==="
        sudo find $VENDOR/lib/hw -name "sensors*" -exec sudo cp {} $SYSTEM/vendor/lib/hw/ \; 2>/dev/null || true
        sudo find $VENDOR/lib64/hw -name "sensors*" -exec sudo cp {} $SYSTEM/vendor/lib64/hw/ \; 2>/dev/null || true

        echo "=== Injecting Fingerprint HAL ==="
        sudo find $VENDOR/lib/hw -name "*fingerprint*" -exec sudo cp {} $SYSTEM/vendor/lib/hw/ \; 2>/dev/null || true
        sudo find $VENDOR/lib64/hw -name "*fingerprint*" -exec sudo cp {} $SYSTEM/vendor/lib64/hw/ \; 2>/dev/null || true

        echo "=== Injecting DRM/Widevine ==="
        sudo mkdir -p $SYSTEM/vendor/lib/mediadrm
        sudo mkdir -p $SYSTEM/vendor/lib64/mediadrm
        sudo find $VENDOR/lib/mediadrm -type f -exec sudo cp {} $SYSTEM/vendor/lib/mediadrm/ \; 2>/dev/null || true
        sudo find $VENDOR/lib64/mediadrm -type f -exec sudo cp {} $SYSTEM/vendor/lib64/mediadrm/ \; 2>/dev/null || true

        echo "=== Injecting Media Codecs ==="
        sudo find $VENDOR/lib/hw -name "*codec*" -exec sudo cp {} $SYSTEM/vendor/lib/hw/ \; 2>/dev/null || true
        sudo find $VENDOR/etc -name "media_codecs*" -exec sudo cp {} $SYSTEM/vendor/etc/ \; 2>/dev/null || true
        sudo find $VENDOR/etc -name "media_profiles*" -exec sudo cp {} $SYSTEM/vendor/etc/ \; 2>/dev/null || true

        echo "=== Injecting Thermal HAL ==="
        sudo find $VENDOR/lib/hw -name "thermal*" -exec sudo cp {} $SYSTEM/vendor/lib/hw/ \; 2>/dev/null || true
        sudo find $VENDOR/lib64/hw -name "thermal*" -exec sudo cp {} $SYSTEM/vendor/lib64/hw/ \; 2>/dev/null || true
        sudo find $VENDOR/etc -name "thermal*" -exec sudo cp {} $SYSTEM/vendor/etc/ \; 2>/dev/null || true

        echo "=== Injecting Charging HAL ==="
        sudo find $VENDOR/lib/hw -name "*health*" -exec sudo cp {} $SYSTEM/vendor/lib/hw/ \; 2>/dev/null || true
        sudo find $VENDOR/lib64/hw -name "*health*" -exec sudo cp {} $SYSTEM/vendor/lib64/hw/ \; 2>/dev/null || true

        echo "=== All blobs injected ==="

    - name: Fix SELinux file contexts
      run: |
        SYSTEM=/mnt/gsi_system
        VENDOR=/mnt/samsung_vendor

        echo "Merging SELinux file contexts..."
        # Get Samsung's file contexts
        if [ -f "$VENDOR/etc/selinux/vendor_file_contexts" ]; then
          sudo cat $VENDOR/etc/selinux/vendor_file_contexts >> /tmp/extra_contexts
          echo "Samsung vendor file contexts extracted"
        fi

        # Apply to system
        if [ -f "$SYSTEM/system/etc/selinux/plat_file_contexts" ]; then
          sudo cat /tmp/extra_contexts >> $SYSTEM/system/etc/selinux/plat_file_contexts 2>/dev/null || true
          echo "SELinux contexts merged"
        fi

        # Fix permissions on injected blobs
        sudo find $SYSTEM/vendor/lib -type f -name "*.so" -exec sudo chmod 644 {} \; 2>/dev/null || true
        sudo find $SYSTEM/vendor/lib64 -type f -name "*.so" -exec sudo chmod 644 {} \; 2>/dev/null || true
        sudo find $SYSTEM/vendor/firmware -type f -exec sudo chmod 644 {} \; 2>/dev/null || true
        echo "Permissions fixed"

    - name: Add Samsung device props
      run: |
        SYSTEM=/mnt/gsi_system
        # Find build.prop
        BUILD_PROP=$(find $SYSTEM -name "build.prop" | head -1)
        echo "Found build.prop at: $BUILD_PROP"

        if [ -f "$BUILD_PROP" ]; then
          sudo tee -a $BUILD_PROP << 'EOF'
        # Samsung M325F device props
        ro.product.vendor.manufacturer=samsung
        ro.product.vendor.brand=samsung
        ro.product.vendor.name=m325fxxx
        ro.product.vendor.device=m325f
        ro.product.vendor.model=SM-M325F
        ro.vendor.build.security_patch=2024-01-01
        # Performance
        ro.config.perf_def=schedutil
        ro.vendor.perf.scroll_opt=true
        # Zram
        ro.zram.mark_idle_delay_mins=60
        ro.zram.first_wb_delay_mins=1440
        # RIL
        rild.libpath=/vendor/lib/libsec-ril.so
        rild.libargs=-d /dev/ttyS0
        ro.telephony.default_network=9
        EOF
          echo "Device props added"
        fi

    - name: Unmount images
      run: |
        sudo umount /mnt/gsi_system || true
        sudo umount /mnt/samsung_vendor || true
        echo "Images unmounted"

    - name: Patch vbmeta
      run: |
        if [ -f vbmeta.img ]; then
          echo "Patching vbmeta to disable verification..."
          # Disable AVB verification flags
          python3 << 'PYEOF'
        with open("vbmeta.img", "r+b") as f:
            data = bytearray(f.read())
            # Set flags to disable verification (byte 123 = flags)
            if len(data) > 123:
                data[123] = 3  # FLAG_HASHTREE_DISABLED | FLAG_VERIFICATION_DISABLED
                f.seek(0)
                f.write(data)
                print("vbmeta patched successfully")
            else:
                print("vbmeta too small, skipping patch")
        PYEOF
        else
          echo "No vbmeta.img found, creating disabled vbmeta..."
          # Create a minimal disabled vbmeta
          dd if=/dev/zero bs=65536 count=1 of=vbmeta.img
        fi

    - name: Repack system image
      run: |
        echo "Repacking system image..."
        e2fsck -f system_raw.img || true
        # Convert back to sparse
        img2simg system_raw.img system_ported.img
        ls -lh system_ported.img
        echo "System image repacked"

    - name: Create flashable zip
      run: |
        mkdir -p flashable/META-INF/com/google/android

        # Copy images
        cp system_ported.img flashable/system.img
        cp vbmeta.img flashable/vbmeta.img

        # Create updater-script
        cat > flashable/META-INF/com/google/android/updater-script << 'EOF'
        ui_print("======================================");
        ui_print(" LineageOS 23.2 Ported for SM-M325F ");
        ui_print("======================================");
        ui_print(" ");
        ui_print("Flashing system partition...");
        package_extract_file("system.img", "/dev/block/by-name/system");
        ui_print("Flashing vbmeta...");
        package_extract_file("vbmeta.img", "/dev/block/by-name/vbmeta");
        ui_print(" ");
        ui_print("Done! Please wipe data/cache before booting.");
        ui_print("======================================");
        EOF

        # Create update-binary (shell script runner for TWRP)
        cat > flashable/META-INF/com/google/android/update-binary << 'BINEOF'
        #!/sbin/sh
        SKIPUNZIP=1
        ui_print() { echo "ui_print $1" >> /proc/self/fd/$OUTFD; echo "ui_print" >> /proc/self/fd/$OUTFD; }
        OUTFD=$2
        ZIPFILE=$3
        ui_print "Extracting files..."
        unzip -o "$ZIPFILE" "system.img" -d /tmp/port/
        unzip -o "$ZIPFILE" "vbmeta.img" -d /tmp/port/
        ui_print "Flashing system.img..."
        dd if=/tmp/port/system.img of=/dev/block/by-name/system bs=4096
        ui_print "Flashing vbmeta.img..."
        dd if=/tmp/port/vbmeta.img of=/dev/block/by-name/vbmeta bs=4096
        ui_print "Done! Wipe data before booting!"
        BINEOF

        chmod +x flashable/META-INF/com/google/android/update-binary

        # Package into zip
        cd flashable
        zip -r9 ../LineageOS-23.2-M325F-Ported.zip .
        cd ..
        ls -lh LineageOS-23.2-M325F-Ported.zip
        echo "Flashable zip created!"

    - name: Upload result
      uses: actions/upload-artifact@v4
      with:
        name: LineageOS-23.2-M325F-Ported
        path: LineageOS-23.2-M325F-Ported.zip
        retention-days: 7
